<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QA Test Cases</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<script src="https://accounts.google.com/gsi/client" async defer onload="onGISLoad()"></script>
</head>
<body>

<!-- ── LOGIN OVERLAY ── -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div class="logo-dot" style="margin:0 auto 12px;">QA</div>
    <h2 style="text-align:center;margin-bottom:4px;font-size:18px;">QA Test Cases</h2>
    <p style="text-align:center;font-size:12px;color:var(--text3);margin-bottom:24px;">Mobile App</p>

    <!-- Step 1: Supabase login -->
    <div id="step-login">
      <div class="login-step-badge">ขั้นที่ 1 — เข้าสู่ระบบ</div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Email</label>
        <input type="email" id="auth-email" class="form-input" placeholder="you@example.com"
          onkeydown="if(event.key==='Enter')handleLogin()" />
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label>Password</label>
        <input type="password" id="auth-password" class="form-input" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')handleLogin()" />
      </div>
      <button class="btn-modal-ok" id="btn-login" style="width:100%;padding:10px;" onclick="handleLogin()">เข้าสู่ระบบ</button>
      <div id="login-error" class="form-error" style="margin-top:12px;display:none;"></div>
    </div>

    <!-- Step 2: Google Drive connect -->
    <div id="step-drive" style="display:none;">
      <div class="login-step-badge login-step-badge-ok">✓ เข้าสู่ระบบแล้ว</div>
      <div class="drive-connect-box">
        <div style="font-size:28px;margin-bottom:8px;">📁</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:4px;">ขั้นที่ 2 — เชื่อมต่อ Google Drive</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6;">
          ข้อมูล test cases เก็บใน Google Drive กลาง<br>
          (ทุกคนใช้ข้อมูลชุดเดียวกัน)
        </div>
        <button class="btn-gdrive" id="btn-connect-drive" onclick="requestGoogleToken()">
          <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0;">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          เชื่อมต่อ Google Drive
        </button>
        <div id="drive-connect-error" class="form-error" style="margin-top:10px;display:none;"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── DRIVE TOKEN EXPIRED BANNER ── -->
<div id="drive-expired-banner" class="drive-expired-banner" style="display:none;">
  <span>⚠️ Google Drive session หมดอายุ</span>
  <button onclick="requestGoogleToken()">เชื่อมต่อใหม่</button>
</div>

<!-- ── SAVING INDICATOR ── -->
<div id="saving-indicator" class="saving-indicator" style="display:none;">
  <div class="spin-dot"></div> กำลังบันทึก...
</div>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo-dot">QA</div>
      <span class="site-title">QA Test Cases</span>
      <span class="site-subtitle">/ Mobile App</span>
    </div>
    <div class="header-right">
      <div class="header-status-strip" id="hdr-status-strip"></div>
      <div class="header-actions">
        <span id="drive-status-badge" class="drive-badge" title="เชื่อมต่อ Google Drive แล้ว" style="display:none;">📁 Drive</span>
        <button class="btn-reset btn-logout" onclick="handleLogout()">Logout</button>
        <button class="btn-reset" onclick="resetAllStatus()">↺ Reset</button>
      </div>
    </div>
  </div>
</header>

<!-- ── NAV TABS ── -->
<nav class="nav-tabs-wrap">
  <div class="nav-tabs" id="nav-tabs"></div>
</nav>

<!-- ── MAIN ── -->
<main class="main">
  <div id="main-content"></div>
</main>

<footer class="site-footer">
  QA Test Cases &nbsp;·&nbsp; Mobile App &nbsp;·&nbsp;
  <span id="footer-year"></span>
</footer>

<script src="js/app.js"></script>
<script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
</body>
</html>
