<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QA Tool v15</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white}
.round-header{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.summary-cards{display:flex;gap:12px;margin-bottom:16px;transition:all 0.3s ease}
.card{background:#1e293b;padding:12px;border-radius:10px;width:120px;text-align:center}
.num{font-size:22px;font-weight:bold}
.pass{color:#22c55e}
.fail{color:#ef4444}
.pending{color:#facc15}
.rate{color:#60a5fa}
.fade{opacity:0;transform:translateY(10px)}
.badge{margin-left:10px;font-weight:bold}
</style>
</head>
<body>

<div class="round-header">
<select id="roundSelect" onchange="changeRound()"></select>
<button onclick="exportHTML()">Export HTML</button>
<button onclick="exportPNG()">Export PNG</button>
<button onclick="exportPDF()">Export PDF</button>
<span id="badge" class="badge"></span>
</div>

<div id="summary"></div>

<script src="app.js"></script>
</body>
</html>
