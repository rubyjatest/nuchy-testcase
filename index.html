<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QA Test Cases</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div class="logo-dot" style="margin: 0 auto 16px;">QA</div>
    <h2 style="text-align:center; margin-bottom: 24px;">เข้าสู่ระบบ</h2>
    <div class="form-group" style="margin-bottom: 12px;">
      <label>Email</label>
      <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" />
    </div>
    <div class="form-group" style="margin-bottom: 24px;">
      <label>Password</label>
      <input type="password" id="auth-password" class="form-input" placeholder="••••••••" />
    </div>
    <button class="btn-modal-ok" id="btn-login" style="width: 100%; padding: 10px;" onclick="handleLogin()">เข้าสู่ระบบ</button>
    <div id="login-error" class="form-error" style="margin-top: 12px; display: none;"></div>
  </div>
</div>
<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo-dot">QA</div>
      <span class="site-title">QA Test Cases</span>
      <span class="site-subtitle">/ Mobile App</span>
    </div>
    <div class="header-right">
      <div class="header-status-strip" id="hdr-status-strip">
        <!-- filled by JS -->
      </div>
      <div class="header-actions">
        <button class="btn-reset btn-logout" onclick="handleLogout()" title="ออกจากระบบ">Logout</button>
        <button class="btn-reset" onclick="resetAllStatus()" title="Reset all statuses">↺ Reset</button>
      </div>
    </div>
  </div>
</header>

<nav class="nav-tabs-wrap">
  <div class="nav-tabs" id="nav-tabs"></div>
</nav>

<main class="main">
  <div id="main-content"></div>
</main>

<footer class="site-footer">
  QA Test Cases &nbsp;·&nbsp; Mobile App &nbsp;·&nbsp;
  <span id="footer-year"></span>
</footer>

<script src="data/xray-planogram.js"></script>
<script src="data/auth.js"></script>
<!-- 👉 <script src="data/my-new-feature.js"></script> -->

<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  });
</script>
</body>
</html>
